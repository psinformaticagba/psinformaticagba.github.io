# Dúvidas Frequentes (FAQ - Página Planos)
data_faqs:
  - pergunta: "Existe fidelidade no contrato?"
    resposta: "Sim, trabalhamos com contratos de 12 meses. Esse período é necessário para estabilizar sua infraestrutura e implementar rotinas preventivas eficazes."
  - pergunta: "Como funciona o atendimento de urgência?"
    resposta: "Para situações de parada total da empresa, o atendimento é prioritário. Planos avançados contam com tempos de resposta (SLA) reduzidos para incidentes críticos."
  - pergunta: "O que acontece se eu precisar de mais visitas?"
    resposta: "Caso exceda a cota do plano, visitas extras podem ser solicitadas com valor diferenciado para contratantes, ou você pode optar pelo upgrade para o próximo plano."
  - pergunta: "Posso migrar de plano durante o contrato?"
    resposta: "Sim. O upgrade pode ser feito a qualquer momento se a sua necessidade técnica aumentar, com ajuste proporcional no valor da mensalidade."
  - pergunta: "O suporte cobre apenas computadores ou também a rede e o servidor?"
    resposta: "Nossos planos são abrangentes e cobram toda a sua infraestrutura: roteadores, switches, servidores, impressoras e estações de trabalho, garantindo que tudo funcione em harmonia."
  - pergunta: "Vocês cuidam do backup dos meus dados?"
    resposta: "Sim. Implementamos e monitoramos rotinas de backup automáticas (locais e em nuvem) para garantir que as informações da sua empresa estejam seguras contra falhas de hardware ou ataques virtuais."
  - pergunta: "O atendimento é apenas presencial ou remoto também?"
    resposta: "Utilizamos ferramentas de acesso remoto seguro para resolver problemas de software em minutos. Caso o problema exija intervenção física, enviamos um técnico até o local conforme o SLA do seu plano."
  - pergunta: "Minha empresa é pequena, vale a pena ter um contrato de TI?"
    resposta: "Com certeza. O contrato previne problemas antes que eles ocorram, evitando paradas repentinas que custam caro. É como um seguro: garantimos que sua tecnologia trabalhe a favor do seu crescimento, e não contra."

